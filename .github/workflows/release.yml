name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example 1.0.0"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve release version
        id: resolve_version
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import sys
          from pathlib import Path

          input_version = "${{ github.event.inputs.version }}".strip()
          manifest_path = Path("custom_components/plant_guardian/manifest.json")
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          current_version = str(manifest["version"]).strip()

          if not re.fullmatch(r"\d+\.\d+\.\d+", current_version):
              print(f"Invalid current version in manifest.json: {current_version}")
              sys.exit(1)

          if input_version:
              version = input_version
              source = "manual input"
          else:
              major, minor, patch = map(int, current_version.split("."))
              version = f"{major}.{minor}.{patch + 1}"
              source = f"manifest.json patch bump from {current_version}"

          if not re.fullmatch(r"\d+\.\d+\.\d+", version):
              print(f"Invalid version: {version}")
              sys.exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as github_output:
              print(f"version={version}", file=github_output)

          print(f"Resolved version ({source}): {version}")
          PY

      - name: Update manifest version
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          version = "${{ steps.resolve_version.outputs.version }}"
          manifest_path = Path("custom_components/plant_guardian/manifest.json")

          data = json.loads(manifest_path.read_text(encoding="utf-8"))
          data["version"] = version
          manifest_path.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
          print(f"Updated manifest.json to {version}")
          PY

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add custom_components/plant_guardian/manifest.json
          git commit -m "Release v${{ steps.resolve_version.outputs.version }}" || echo "No changes to commit"

      - name: Create and push tag
        run: |
          git tag "v${{ steps.resolve_version.outputs.version }}"
          git push origin main
          git push origin "v${{ steps.resolve_version.outputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.resolve_version.outputs.version }}
          name: v${{ steps.resolve_version.outputs.version }}
