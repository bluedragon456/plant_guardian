name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get current version
        id: version
        run: |
          VERSION=$(grep '"version"' custom_components/plant_guardian/manifest.json | cut -d '"' -f4)
          echo "current=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump patch version
        id: bump
        run: |
          VERSION=${{ steps.version.outputs.current }}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH+1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update manifest.json
        run: |
          sed -i "s/\"version\": \".*\"/\"version\": \"${{ steps.bump.outputs.new }}\"/" custom_components/plant_guardian/manifest.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add custom_components/plant_guardian/manifest.json
          git commit -m "Auto bump version to ${{ steps.bump.outputs.new }}"
          git push

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new }}
          name: Plant Guardian v${{ steps.bump.outputs.new }}
          generate_release_notes: true
