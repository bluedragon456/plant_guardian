  <path d="M126 1058C188 1046 234 1062 283 1048C337 1033 383 1019 436 1024C486 1029 533 995 588 1004C640 1012 681 978 738 986C791 994 838 960 892 964C944 968 988 942 1036 944C1093 946 1133 926 1176 918C1239 907 1272 884 1316 882C1383 879 1430 854 1472 840" stroke="#6F95AB" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  <line x1="126" y1="1072" x2="1478" y2="1072" stroke="#CFD4CD"/>
  <text x="126" y="1120" class="ui small muted">History graph for status, moisture, light, and temperature across the last 7 days</text>
</svg>
