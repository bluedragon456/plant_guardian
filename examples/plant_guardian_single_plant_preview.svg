<svg width="1600" height="1180" viewBox="0 0 1600 1180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F1E8"/>
      <stop offset="1" stop-color="#DCE7D7"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="480" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D4F3C"/>
      <stop offset="1" stop-color="#4F7A56"/>
    </linearGradient>
    <linearGradient id="photo" x1="0" y1="0" x2="360" y2="310" gradientUnits="userSpaceOnUse">
      <stop stop-color="#335D45"/>
      <stop offset="1" stop-color="#8BAE75"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#163322" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: Georgia, 'Times New Roman', serif; fill: #1C3027; }
      .ui { font-family: 'Segoe UI', Tahoma, sans-serif; }
      .muted { fill: #68786F; }
      .card { fill: rgba(255,255,255,0.82); stroke: rgba(28,48,39,0.08); stroke-width: 1; }
      .title { font-size: 52px; font-weight: 700; }
      .label { font-size: 22px; font-weight: 700; }
      .small { font-size: 18px; }
      .metric { font-size: 40px; font-weight: 700; }
    </style>
  </defs>
  <rect width="1600" height="1180" fill="url(#bg)"/>
  <circle cx="1455" cy="130" r="185" fill="#CFE0C4" opacity="0.55"/>
  <circle cx="120" cy="1040" r="220" fill="#C9D8BB" opacity="0.4"/>

  <text x="78" y="86" class="title">Single-Plant Dashboard</text>
  <text x="82" y="122" class="ui muted" font-size="22">Focused care cockpit for one plant, built from the example Lovelace YAML</text>

  <rect x="80" y="164" width="470" height="220" rx="30" fill="url(#panel)" filter="url(#shadow)"/>
  <text x="118" y="225" class="ui" font-size="24" fill="#EAF5E7">Monstera Deliciosa</text>
  <text x="118" y="288" font-size="56" font-weight="700" fill="#FFFFFF">Healthy</text>
  <text x="118" y="338" class="ui" font-size="22" fill="#D8E8D7">No active problems. Moisture is comfortable.</text>
  <rect x="118" y="354" width="148" height="14" rx="7" fill="#D3E5D1" opacity="0.55"/>
  <rect x="118" y="354" width="96" height="14" rx="7" fill="#8EC68E"/>

  <rect x="580" y="164" width="270" height="220" rx="28" class="card" filter="url(#shadow)"/>
  <text x="610" y="210" class="label ui">Care Signals</text>
  <text x="612" y="258" class="ui small">Needs care</text>
  <text x="748" y="258" class="ui metric">No</text>
  <text x="612" y="304" class="ui small">Days since watered</text>
  <text x="782" y="304" class="ui metric">3</text>
  <text x="612" y="350" class="ui small">Days since fertilized</text>
  <text x="794" y="350" class="ui metric">21</text>

  <rect x="880" y="164" width="640" height="220" rx="28" class="card" filter="url(#shadow)"/>
  <text x="912" y="210" class="label ui">Quick Actions</text>
  <rect x="914" y="242" width="275" height="104" rx="24" fill="#215F47"/>
  <text x="965" y="302" class="ui" font-size="30" font-weight="700" fill="#FFFFFF">Mark Watered</text>
  <rect x="1204" y="242" width="275" height="104" rx="24" fill="#5E875C"/>
  <text x="1246" y="302" class="ui" font-size="30" font-weight="700" fill="#FFFFFF">Mark Fertilized</text>

  <rect x="80" y="426" width="410" height="310" rx="28" fill="url(#photo)" filter="url(#shadow)"/>
  <path d="M195 681C165 627 169 566 233 523C294 589 294 656 257 704C233 715 211 706 195 681Z" fill="#EAF6DE"/>
  <path d="M265 682C235 625 238 558 311 507C367 574 368 651 326 703C306 714 284 707 265 682Z" fill="#D9EDC7"/>
  <path d="M334 680C305 626 309 573 365 538C417 594 420 658 386 703C367 713 350 705 334 680Z" fill="#F1F8E7"/>
  <text x="114" y="699" class="ui" font-size="22" fill="#F6FAF1">Plant image from status entity picture</text>

