  <text x="550" y="470" class="label ui">Live Gauges</text>
  <circle cx="610" cy="566" r="52" stroke="#D2E2EC" stroke-width="18"/>
  <path d="M610 514 A52 52 0 1 1 567 636" stroke="#5A8FAE" stroke-width="18" stroke-linecap="round"/>
  <text x="579" y="575" class="ui" font-size="22">61%</text>
  <text x="568" y="650" class="ui small">Moisture</text>
  <circle cx="750" cy="566" r="52" stroke="#E5D7A6" stroke-width="18"/>
  <path d="M750 514 A52 52 0 1 1 710 626" stroke="#D19F2A" stroke-width="18" stroke-linecap="round"/>
  <text x="722" y="575" class="ui" font-size="22">842</text>
  <text x="727" y="650" class="ui small">Light</text>
  <rect x="558" y="676" width="244" height="18" rx="9" fill="#E8D4C9"/>
  <rect x="558" y="676" width="152" height="18" rx="9" fill="#B66F4C"/>
  <text x="558" y="722" class="ui small">Temperature 72 F</text>

  <rect x="870" y="426" width="650" height="310" rx="28" class="card" filter="url(#shadow)"/>
  <text x="902" y="470" class="label ui">Care Details</text>
  <text x="904" y="530" class="ui small">Species</text>
  <text x="1188" y="530" class="ui small">Monstera deliciosa</text>
  <line x1="904" y1="546" x2="1480" y2="546" stroke="#D7DDD5"/>
  <text x="904" y="592" class="ui small">Last watered</text>
  <text x="1188" y="592" class="ui small">March 10, 2026</text>
  <line x1="904" y1="608" x2="1480" y2="608" stroke="#D7DDD5"/>
  <text x="904" y="654" class="ui small">Last fertilized</text>
  <text x="1188" y="654" class="ui small">February 21, 2026</text>
  <line x1="904" y1="670" x2="1480" y2="670" stroke="#D7DDD5"/>
  <text x="904" y="716" class="ui small">Care summary</text>
  <text x="1188" y="716" class="ui small">Bright indirect light. Water when top soil dries.</text>

  <rect x="80" y="778" width="1440" height="316" rx="30" class="card" filter="url(#shadow)"/>
  <text x="114" y="828" class="label ui">Recent Trends</text>
  <path d="M126 1010C190 988 228 1002 278 962C338 914 382 920 436 876C478 841 530 850 582 824C636 797 684 819 731 788C790 749 835 766 888 734C942 702 983 710 1030 720C1079 730 1124 692 1177 708C1230 724 1268 686 1314 690C1371 695 1411 664 1472 642" stroke="#2D684E" stroke-width="8" stroke-linecap="round"/>
