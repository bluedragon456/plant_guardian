<svg width="1600" height="1180" viewBox="0 0 1600 1180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3EFE4"/>
      <stop offset="1" stop-color="#D6E4D8"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="520" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E4B39"/>
      <stop offset="1" stop-color="#4D7554"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#163322" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: Georgia, 'Times New Roman', serif; fill: #1A3026; }
      .ui { font-family: 'Segoe UI', Tahoma, sans-serif; }
      .muted { fill: #68776D; }
      .card { fill: rgba(255,255,255,0.82); stroke: rgba(26,48,38,0.08); stroke-width: 1; }
      .title { font-size: 52px; font-weight: 700; }
      .label { font-size: 22px; font-weight: 700; }
      .small { font-size: 18px; }
      .metric { font-size: 38px; font-weight: 700; }
    </style>
  </defs>
  <rect width="1600" height="1180" fill="url(#bg)"/>
  <circle cx="1430" cy="150" r="190" fill="#CCDEC9" opacity="0.55"/>
  <circle cx="170" cy="1040" r="210" fill="#C7D7BE" opacity="0.42"/>

  <text x="80" y="86" class="title">All-Plants Snapshot Dashboard</text>
  <text x="84" y="122" class="ui muted" font-size="22">Report-style overview for the whole collection, matching the all-plants YAML example</text>

  <rect x="80" y="162" width="500" height="228" rx="30" fill="url(#hero)" filter="url(#shadow)"/>
  <text x="120" y="222" class="ui" font-size="24" fill="#EAF4E6">Plant Fleet Snapshot</text>
  <text x="120" y="286" font-size="54" font-weight="700" fill="#FFFFFF">3 plants online</text>
  <text x="120" y="338" class="ui" font-size="22" fill="#D7E8D7">1 needs attention, 2 are stable, all care logs visible.</text>

  <rect x="610" y="162" width="370" height="228" rx="28" class="card" filter="url(#shadow)"/>
  <text x="640" y="208" class="label ui">Attention Queue</text>
  <rect x="640" y="242" width="306" height="70" rx="20" fill="#FFF0E6"/>
  <circle cx="670" cy="277" r="9" fill="#D36A2C"/>
  <text x="692" y="282" class="ui small">Fiddle Leaf Fig</text>
  <text x="692" y="306" class="ui small muted">needs_watering</text>
  <rect x="640" y="328" width="160" height="34" rx="17" fill="#E5F0E0"/>
  <text x="658" y="350" class="ui" font-size="15">Queue clears after logging</text>

  <rect x="1010" y="162" width="510" height="228" rx="28" class="card" filter="url(#shadow)"/>
  <text x="1040" y="208" class="label ui">Portfolio Tiles</text>
  <rect x="1040" y="240" width="138" height="122" rx="22" fill="#1E5C45"/>
  <text x="1062" y="274" class="ui" font-size="16" fill="#DDEFD8">Monstera</text>
  <text x="1062" y="326" class="ui metric" fill="#FFFFFF">Healthy</text>
  <rect x="1198" y="240" width="138" height="122" rx="22" fill="#9AAE74"/>
  <text x="1220" y="274" class="ui" font-size="16">Snake Plant</text>
  <text x="1220" y="326" class="ui metric">Healthy</text>
  <rect x="1356" y="240" width="138" height="122" rx="22" fill="#F0D99A"/>
  <text x="1374" y="274" class="ui" font-size="16">Fiddle Leaf</text>
  <text x="1374" y="326" class="ui metric">Water</text>

  <rect x="80" y="430" width="700" height="320" rx="28" class="card" filter="url(#shadow)"/>
  <text x="112" y="476" class="label ui">Care Cadence</text>
  <line x1="112" y1="520" x2="744" y2="520" stroke="#D3D8D2"/>
  <text x="112" y="562" class="ui small">Monstera watered</text>
  <text x="610" y="562" class="ui small">3 d</text>
  <text x="112" y="604" class="ui small">Monstera fertilized</text>
  <text x="610" y="604" class="ui small">21 d</text>
  <text x="112" y="646" class="ui small">Snake Plant watered</text>
  <text x="610" y="646" class="ui small">8 d</text>
  <text x="112" y="688" class="ui small">Snake Plant fertilized</text>
  <text x="610" y="688" class="ui small">36 d</text>
  <text x="112" y="730" class="ui small">Fiddle Leaf watered</text>
  <text x="610" y="730" class="ui small">9 d</text>

  <rect x="810" y="430" width="710" height="320" rx="28" class="card" filter="url(#shadow)"/>
  <text x="842" y="476" class="label ui">Log Actions</text>
  <rect x="844" y="520" width="200" height="86" rx="22" fill="#1F654A"/>
  <text x="876" y="571" class="ui" font-size="28" font-weight="700" fill="#FFFFFF">Water Monstera</text>
  <rect x="1066" y="520" width="200" height="86" rx="22" fill="#3C7A54"/>
  <text x="1100" y="571" class="ui" font-size="28" font-weight="700" fill="#FFFFFF">Water Snake</text>
  <rect x="1288" y="520" width="200" height="86" rx="22" fill="#699163"/>
  <text x="1318" y="571" class="ui" font-size="28" font-weight="700" fill="#FFFFFF">Water Fiddle</text>
  <rect x="844" y="636" width="644" height="76" rx="20" fill="#F5F7F1"/>
  <text x="876" y="682" class="ui small">Fast logging section keeps the report actionable, not just descriptive.</text>

  <rect x="80" y="792" width="1440" height="302" rx="30" class="card" filter="url(#shadow)"/>
  <text x="112" y="840" class="label ui">Weekly Status History</text>
  <path d="M124 1004C184 980 230 986 286 958C336 933 383 928 432 940C489 955 544 911 599 885C651 861 694 873 748 842C800 811 847 820 899 834C955 848 1004 822 1055 792C1100 766 1145 770 1196 786C1242 801 1288 780 1335 758C1385 734 1427 734 1476 718" stroke="#2E684E" stroke-width="8" stroke-linecap="round"/>
  <path d="M124 1032C188 1018 235 1044 287 1026C342 1008 383 1015 438 992C490 970 537 982 592 960C644 939 695 945 749 928C796 914 844 883 898 893C952 903 998 876 1054 882C1106 887 1150 868 1200 858C1252 847 1295 832 1339 830C1393 827 1430 800 1476 792" stroke="#C28B2A" stroke-width="7" stroke-linecap="round" opacity="0.88"/>
  <path d="M124 1060C183 1049 232 1062 288 1051C338 1042 389 1028 438 1036C487 1044 537 1014 590 1020C642 1026 694 1002 748 1005C804 1009 844 982 896 985C951 988 999 965 1056 960C1108 956 1147 937 1200 925C1252 913 1290 904 1338 900C1387 896 1429 878 1476 856" stroke="#6F95AB" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  <line x1="124" y1="1072" x2="1484" y2="1072" stroke="#CFD5CE"/>
  <text x="124" y="1120" class="ui small muted">Collection history graph for status sensors across the last 7 days</text>
</svg>
