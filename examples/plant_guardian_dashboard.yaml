# Plant Guardian starter dashboard bundle
#
# This file combines a report view and a single-plant view in one dashboard.
# For cleaner imports, prefer the dedicated files:
# - examples/plant_guardian_report_dashboard.yaml
# - examples/plant_guardian_single_plant_dashboard.yaml

title: Plant Guardian
views:
  - title: Snapshot
    path: snapshot
    icon: mdi:view-dashboard-outline
    type: sections
    max_columns: 4
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Plant Fleet Snapshot
            heading_style: title
            icon: mdi:sprout-outline
          - type: markdown
            content: >
              Swap the example entity IDs for your own plants, then duplicate
              or trim cards as needed.
          - type: entity-filter
            show_empty: false
            state_filter:
              - dry
              - low_light
              - cold
              - hot
              - needs_watering
              - needs_fertilizer
              - needs_care
            entities:
              - entity: sensor.monstera_deliciosa_status
                name: Monstera Deliciosa
            card:
              type: entities
              title: Plants needing care
  - title: Monstera
    path: monstera
    icon: mdi:leaf
    type: sections
    max_columns: 4
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Monstera Deliciosa
            heading_style: title
            icon: mdi:leaf-circle-outline
          - type: markdown
            content: |
              {% set image = state_attr('sensor.monstera_deliciosa_status', 'image') %}
              {% set safe_image = image | replace(' ', '%20') if image else none %}
              {% if safe_image %}
              <img src="{{ safe_image }}" alt="Monstera Deliciosa" style="width: 100%; border-radius: 16px; display: block; object-fit: cover;" />
              <p><strong>Status:</strong> {{ states('sensor.monstera_deliciosa_status') | replace('_', ' ') }}</p>
              {% else %}
              ### Monstera Deliciosa
              _No plant image available yet. Add an image URL or enable OpenPlantbook image sync._
              {% endif %}
